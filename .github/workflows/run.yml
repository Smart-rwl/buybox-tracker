name: BuyBox Tracker

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 5 AM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: playwright install

      - run: python main.py
